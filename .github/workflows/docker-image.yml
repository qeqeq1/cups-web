name: Docker Image CI (Native ARM)

on:
  push:
    branches: [ "master" ]
    # 建议：如果是发布版本，可以增加 tag 触发
    tags:
      - 'v*'
  pull_request:
    branches: [ "master" ]

# 必须添加权限，否则无法上传到 Release
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ARMv7 image
        run: |
          docker buildx build \
            --platform linux/arm/v7 \
            -t cups-web:armv7 \
            --load \
            .

      - name: Save Docker image as tar
        run: |
          docker save cups-web:armv7 -o cups-web-armv7.tar

      # 第一步：上传到 Artifacts（保留原功能，方便内部测试）
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cups-web-armv7-image
          path: cups-web-armv7.tar
          retention-days: 7

      # 第二步：上传到 GitHub Release
      - name: Release ARMv7 Tar
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'push' # 仅在 push 时触发，PR 不触发
        with:
          # 如果是推送 master，标签设为 latest；如果是推送 tag，则使用 tag 名
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || 'latest' }}
          name: ${{ github.ref_type == 'tag' && github.ref_name || 'Latest Continuous Build' }}
          draft: false
          prerelease: ${{ github.ref_type != 'tag' }} # 如果不是 tag 推送，标记为预发布
          files: |
            cups-web-armv7.tar
          # 自动生成 Release Note 摘要
          generate_release_notes: true
